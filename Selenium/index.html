<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <style>
        body { font-family: sans-serif; background-color: #eef2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .converter-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input[type="number"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        select { width: 100%; padding: 10px; border-radius: 5px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; width: 100%; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.2em; color: #333; }
    </style>
</head>
<body>

<div class="converter-card">
    <h2>Converter</h2>
    <input type="number" id="tempInput" placeholder="Enter temperature">
    <select id="conversionType">
        <option value="cToF">Celsius to Fahrenheit</option>
        <option value="fToC">Fahrenheit to Celsius</option>
    </select>
    <button onclick="convert()">Convert</button>
    <div id="result"></div>
</div>

<script>
    function convert() {
        let inputTemp = parseFloat(document.getElementById('tempInput').value);
        let type = document.getElementById('conversionType').value;
        let resultDiv = document.getElementById('result');
        let convertedTemp;

        if (isNaN(inputTemp)) {
            resultDiv.innerHTML = "Please enter a number";
            return;
        }

        if (type === 'cToF') {
            convertedTemp = (inputTemp * 9/5) + 32;
            resultDiv.innerHTML = `${inputTemp}°C = ${convertedTemp.toFixed(2)}°F`;
        } else {
            convertedTemp = (inputTemp - 32) * 5/9;
            resultDiv.innerHTML = `${inputTemp}°F = ${convertedTemp.toFixed(2)}°C`;
        }
    }
</script>

</body>
</html>
